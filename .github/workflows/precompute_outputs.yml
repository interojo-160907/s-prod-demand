name: Precompute dashboard snapshots

on:
  workflow_dispatch: {}
  schedule:
    # 08:30 KST daily (KST = UTC+9)
    - cron: "30 23 * * *"
  push:
    paths:
      - "s관 부족수량.xlsx"
      - "excel_analysis.py"
      - "requirements.txt"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: precompute-snapshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate snapshots (out/*.csv)
        run: |
          python excel_analysis.py --file "s관 부족수량.xlsx" --out out --due-process --prod-daily

      - name: Create pull request (if changed)
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            out/*.csv
            out/*.json
          commit-message: "chore: update dashboard snapshots"
          title: "chore: update dashboard snapshots"
          body: |
            Automated update of precomputed dashboard snapshots under `out/`.
            Merge this PR to update `main`.
          branch: "chore/update-dashboard-snapshots"
          delete-branch: true
