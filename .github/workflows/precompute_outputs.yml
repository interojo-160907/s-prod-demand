name: Precompute dashboard snapshots

on:
  workflow_dispatch: {}
  schedule:
    # 08:40 KST daily (KST = UTC+9)
    - cron: "40 23 * * *"
  push:
    paths:
      - "s관 부족수량.xlsx"
      - "excel_analysis.py"
      - "requirements.txt"

permissions:
  contents: write

concurrency:
  group: precompute-snapshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate snapshots (out/*.csv)
        run: |
          python excel_analysis.py --file "s관 부족수량.xlsx" --out out --due-process --prod-daily

      - name: Commit snapshots to branch (if changed)
        shell: bash
        run: |
          git add out/*.csv out/*.json || true
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update dashboard snapshots"
          git push
