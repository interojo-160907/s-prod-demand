name: Refresh derived outputs

on:
  workflow_dispatch:
  push:
    paths:
      - "s관 부족수량.xlsx"
      - "data/s관 부족수량.xlsx"
      - "excel_analysis.py"
      - "requirements.txt"
  schedule:
    # 00:10 KST daily (15:10 UTC)
    - cron: "10 15 * * *"

permissions:
  contents: write

jobs:
  build-out:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate outputs
        run: |
          python excel_analysis.py --due-process --out out

      - name: Commit outputs
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out
          git commit -m "chore: refresh derived outputs"
          git push
